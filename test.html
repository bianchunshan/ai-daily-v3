<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
        img { width: 100%; max-width: 200px; height: 150px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>前沿科技日报 - 测试版</h1>
    <div id="newsList"></div>
    
    <script>
        const newsData = [
            {
                id: 1,
                title: "测试新闻标题1",
                summary: "这是测试新闻摘要内容...",
                image: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMTUwIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjE1MCIgZmlsbD0iI2U3NGMzYyI+PC9yZWN0Pjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjE0IiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsIj7lm73pmYXlsYDlir88L3RleHQ+PC9zdmc+",
                category: "人工智能",
                source: "测试来源",
                time: "刚刚"
            },
            {
                id: 2,
                title: "测试新闻标题2",
                summary: "这是第二条测试新闻...",
                image: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMTUwIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjE1MCIgZmlsbD0iIzM0OThkYiI+PC9yZWN0Pjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjE0IiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsIj7po47pmYXlsYDlir88L3RleHQ+PC9zdmc+",
                category: "集成电路",
                source: "测试来源2",
                time: "1小时前"
            }
        ];
        
        function renderNews(list) {
            const container = document.getElementById('newsList');
            container.innerHTML = '';
            
            list.forEach(news => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${news.title}</h3>
                    <img src="${news.image}" alt="">
                    <p>${news.summary}</p>
                    <small>${news.source} · ${news.time}</small>
                `;
                container.appendChild(card);
            });
        }
        
        renderNews(newsData);
        console.log('测试页面加载完成，新闻数:', newsData.length);
    </script>
</body>
</html>
