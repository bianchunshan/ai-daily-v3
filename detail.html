<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f04142">
    <title>资讯详情 - 前沿科技日报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --primary: #f04142;
            --primary-dark: #d9363e;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #e8e8e8;
            --tag-bg: #f0f0f0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* 顶部导航 */
        .header {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .header-actions {
            display: flex;
            gap: 16px;
            font-size: 20px;
        }
        
        /* 内容区域 */
        .content {
            padding: 16px;
        }
        
        /* 文章标题 */
        .article-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        /* 文章元信息 */
        .article-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .source-badge {
            background: rgba(240, 65, 66, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        /* 大图 */
        .article-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        /* 标签 */
        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tag {
            font-size: 13px;
            padding: 6px 12px;
            background: var(--tag-bg);
            border-radius: 4px;
            color: var(--text-secondary);
        }
        
        .tag.primary {
            background: rgba(240, 65, 66, 0.1);
            color: var(--primary);
        }
        
        /* 文章内容 */
        .article-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-primary);
        }
        
        .article-content p {
            margin-bottom: 16px;
        }
        
        .article-content h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 12px;
            color: var(--text-primary);
        }
        
        /* 股票关联 */
        .stock-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
        }
        
        .stock-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .stock-name {
            font-weight: 600;
            font-size: 15px;
        }
        
        .stock-code {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        .stock-price {
            text-align: right;
        }
        
        .stock-current {
            font-size: 18px;
            font-weight: 600;
        }
        
        .stock-change {
            font-size: 13px;
            font-weight: 500;
        }
        
        .stock-change.up {
            color: #ef4444;
        }
        
        .stock-change.down {
            color: #22c55e;
        }
        
        /* 操作按钮 */
        .action-bar {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 12px;
        }
        
        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .action-btn.primary {
            background: var(--primary);
            color: white;
        }
        
        .action-btn.secondary {
            background: var(--bg);
            color: var(--text-primary);
        }
        
        /* 相关推荐 */
        .related-section {
            margin-top: 24px;
        }
        
        .related-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            padding: 0 16px;
        }
        
        .related-list {
            padding: 0 16px;
        }
        
        .related-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            cursor: pointer;
        }
        
        .related-thumb {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .related-content {
            flex: 1;
        }
        
        .related-item-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .related-meta {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        /* 底部占位 */
        .bottom-space {
            height: 40px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <span class="back-btn" onclick="history.back()">←</span>
        <span class="header-title">资讯详情</span>
        <div class="header-actions">
            <span>⋮</span>
        </div>
    </header>
    
    <!-- 内容区域 -->
    <div class="content">
        <!-- 标题 -->
        <h1 class="article-title" id="articleTitle">加载中...</h1>
        
        <!-- 元信息 -->
        <div class="article-meta">
            <span class="source-badge" id="articleSource">-</span>
            <span id="articleTime">-</span>
            <span>👁 <span id="articleViews">-</span>次阅读</span>
        </div>
        
        <!-- 大图 -->
        <img class="article-image" id="articleImage" src="" alt="">
        
        <!-- 标签 -->
        <div class="article-tags" id="articleTags"></div>
        
        <!-- 文章内容 -->
        <div class="article-content" id="articleContent">
            <p>加载中...</p>
        </div>
        
        <!-- 股票关联 -->
        <div class="stock-section" id="stockSection" style="display: none;">
            <div class="section-title">📈 相关股票</div>
            <div class="stock-list" id="stockList"></div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="action-bar">
            <button class="action-btn secondary" onclick="shareArticle()">
                <span>📤</span>
                <span>分享</span>
            </button>
            <button class="action-btn primary" onclick="openOriginal()">
                <span>🔗</span>
                <span>查看原文</span>
            </button>
        </div>
    </div>
    
    <!-- 相关推荐 -->
    <div class="related-section">
        <div class="related-title">相关推荐</div>
        <div class="related-list" id="relatedList">
            <!-- 动态加载 -->
        </div>
    </div>
    
    <div class="bottom-space"></div>

        let currentArticle = null;
        
        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        // 加载文章
        function loadArticle() {
            const articleId = getUrlParam('id');
            
            if (!articleId) {
                document.getElementById('articleTitle').textContent = '文章不存在';
                return;
            }
            
            const article = newsData.find(n => n.id === parseInt(articleId));
            
            if (!article) {
                document.getElementById('articleTitle').textContent = '文章不存在';
                return;
            }
            
            currentArticle = article;
            
            // 填充内容
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleSource').textContent = article.source;
            document.getElementById('articleTime').textContent = article.time;
            document.getElementById('articleViews').textContent = article.views;
            document.getElementById('articleImage').src = article.image;
            document.getElementById('articleContent').innerHTML = article.content || `<p>${article.summary}</p>`;
            
            // 填充标签
            const tagsHtml = article.tags.map(tag => 
                `<span class="tag ${tag === article.tags[0] ? 'primary' : ''}">${tag}</span>`
            ).join('');
            document.getElementById('articleTags').innerHTML = tagsHtml;
            
            // 填充股票
            if (article.stocks && article.stocks.length > 0) {
                document.getElementById('stockSection').style.display = 'block';
                const stockHtml = article.stocks.map(stock => {
                    const trendClass = stock.trend === 'up' ? 'up' : 'down';
                    return `<div class="stock-item">
                        <div class="stock-info">
                            <span class="stock-name">${stock.name}</span>
                            <span class="stock-code">${stock.code}</span>
                        </div>
                        <div class="stock-price">
                            <div class="stock-current">$${stock.price}</div>
                            <div class="stock-change ${trendClass}">${stock.change}</div>
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('stockList').innerHTML = stockHtml;
            }
            
            // 加载相关推荐
            loadRelated(article);
        }
        
        // 加载相关推荐
        function loadRelated(currentArticle) {
            const related = newsData
                .filter(n => n.id !== currentArticle.id && n.category === currentArticle.category)
                .slice(0, 3);
            
            const container = document.getElementById('relatedList');
            
            related.forEach(item => {
                const div = document.createElement('div');
                div.className = 'related-item';
                div.onclick = () => window.location.href = `detail.html?id=${item.id}`;
                div.innerHTML = `
                    <img class="related-thumb" src="${item.image}" alt="">
                    <div class="related-content">
                        <div class="related-item-title">${item.title}</div>
                        <div class="related-meta">${item.source} · ${item.time}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        // 分享功能
        function shareArticle() {
            if (navigator.share) {
                navigator.share({
                    title: currentArticle.title,
                    text: currentArticle.summary,
                    url: window.location.href
                });
            } else {
                alert('链接已复制到剪贴板');
            }
        }
        
        // 查看原文
        function openOriginal() {
            if (currentArticle && currentArticle.url) {
                window.open(currentArticle.url, '_blank');
            }
        }
        
        // 初始化
        loadArticle();
    </script>

</html>
