<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f04142">
    <title>股票详情 - 前沿科技日报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --primary: #f04142;
            --primary-dark: #d9363e;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #e8e8e8;
            --up: #ef4444;
            --down: #22c55e;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* 顶部导航 */
        .header {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }
        
        /* 股票头部信息 */
        .stock-header {
            background: var(--card-bg);
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .stock-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .stock-info-left {
            flex: 1;
        }
        
        .stock-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stock-code {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .stock-price-section {
            text-align: right;
        }
        
        .stock-current-price {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stock-current-price.up {
            color: var(--up);
        }
        
        .stock-current-price.down {
            color: var(--down);
        }
        
        .stock-change-box {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        
        .stock-change-value, .stock-change-percent {
            font-size: 14px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .stock-change-value.up, .stock-change-percent.up {
            background: rgba(239, 68, 68, 0.1);
            color: var(--up);
        }
        
        .stock-change-value.down, .stock-change-percent.down {
            background: rgba(34, 197, 94, 0.1);
            color: var(--down);
        }
        
        /* 市场数据 */
        .market-data {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .market-item {
            text-align: center;
        }
        
        .market-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }
        
        .market-value {
            font-size: 14px;
            font-weight: 600;
        }
        
        /* 走势图 */
        .chart-section {
            background: var(--card-bg);
            margin-top: 12px;
            padding: 16px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .chart-tabs {
            display: flex;
            gap: 8px;
        }
        
        .chart-tab {
            font-size: 13px;
            padding: 4px 12px;
            background: var(--bg);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .chart-tab.active {
            background: var(--primary);
            color: white;
        }
        
        #stockChart {
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, rgba(240, 65, 66, 0.05) 0%, transparent 100%);
            border-radius: 8px;
        }
        
        /* 公司信息 */
        .company-section {
            background: var(--card-bg);
            margin-top: 12px;
            padding: 16px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .company-desc {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
        }
        
        .company-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .company-info-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
        }
        
        .company-info-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }
        
        .company-info-value {
            font-size: 14px;
            font-weight: 600;
        }
        
        /* 相关新闻 */
        .news-section {
            background: var(--card-bg);
            margin-top: 12px;
            padding: 16px;
        }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .news-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .news-item:active {
            background: #e8e8e8;
        }
        
        .news-thumb {
            width: 80px;
            height: 60px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .news-content {
            flex: 1;
        }
        
        .news-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-meta {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        /* 操作按钮 */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        
        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .action-btn.primary {
            background: var(--primary);
            color: white;
        }
        
        .action-btn.secondary {
            background: var(--bg);
            color: var(--text-primary);
        }
        
        .bottom-space {
            height: 80px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->

        <span class="back-btn" onclick="history.back()">←</span>
        <span class="header-title">股票详情</span>

    <!-- 股票头部信息 -->

    <!-- 走势图 -->
    <div class="chart-section">

    <!-- 公司信息 -->

        <div class="company-info-grid">

            <div class="company-info-item">
                <div class="company-info-label">总部所在地</div>

            <div class="company-info-item">
                <div class="company-info-label">CEO</div>

            <div class="company-info-item">
                <div class="company-info-label">员工数</div>

    </div>
    
    <!-- 相关新闻 -->
    <div class="news-section">

    <div class="bottom-space"></div>
    
    <!-- 操作按钮 -->
    <div class="action-bar">
        <button class="action-btn secondary" onclick="addToWatchlist()">
            <span>⭐</span>

        </button>
        <button class="action-btn primary" onclick="shareStock()">
            <span>📤</span>

    </div>
    
    <script>

            'GOOGL': {

                foundDate: '1998年',
                hqLocation: '美国加利福尼亚州山景城',
                ceo: 'Sundar Pichai',

            'TSM': {

                code: 'TSM',

                foundDate: '1987年',

                ceo: '魏哲家',

            },
            'AMD': {
                name: 'AMD',
                code: 'AMD',
                desc: 'AMD是全球领先的半导体公司，主要生产CPU、GPU等处理器产品。近年来凭借Ryzen处理器和EPYC数据中心芯片在PC和服务器市场取得重大突破，是英特尔和英伟达的主要竞争对手。',
                foundDate: '1969年',
                hqLocation: '美国加利福尼亚州圣克拉拉',
                ceo: '苏姿丰',
                employees: '2.6万'
            },
            'IBM': {
                name: 'IBM',
                code: 'IBM',
                desc: 'IBM是全球历史最悠久的科技公司之一，业务涵盖云计算、人工智能、量子计算、企业咨询等领域。近年来成功转型，专注于混合云和AI业务，其Watson AI平台在企业级市场有广泛应用。',
                foundDate: '1911年',
                hqLocation: '美国纽约州阿蒙克',
                ceo: 'Arvind Krishna',
                employees: '28.8万'
            }
        };
        
        // 新闻数据库
        const newsData = [
            {
                id: 1,
                title: "OpenAI发布GPT-5预览版，性能提升300%，支持多模态实时交互",
                image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=200&h=150&fit=crop",
                source: "华尔街见闻",
                time: "10分钟前",
                stocks: ['MSFT', 'NVDA']
            },
            {
                id: 2,
                title: "台积电宣布2nm芯片量产提前至2026年，苹果A20芯片首发采用",
                image: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=200&h=150&fit=crop",
                source: "财联社",
                time: "25分钟前",
                stocks: ['TSM', 'AAPL']
            },
            {
                id: 3,
                title: "特斯拉FSD V13在中国开启公测，自动驾驶能力接近L4级别",
                image: "https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=200&h=150&fit=crop",
                source: "36氪",
                time: "1小时前",
                stocks: ['TSLA']
            },
            {
                id: 7,
                title: "英伟达H200芯片供不应求，订单排期至2025年Q3",
                image: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=200&h=150&fit=crop",
                source: "证券时报",
                time: "5小时前",
                stocks: ['NVDA', 'AMD']
            }
        ];
        
        let currentStock = null;
        let currentStockPrice = null;
        
        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        // 从Alpha Vantage获取实时股价
        async function fetchStockPrice(symbol) {
            try {
                const url = `${API_BASE}?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;
                
                document.getElementById('currentPrice').textContent = '加载中...';
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data['Global Quote'] && data['Global Quote']['05. price']) {
                    const quote = data['Global Quote'];
                    const price = parseFloat(quote['05. price']);
                    const change = parseFloat(quote['09. change']);
                    const changePercent = quote['10. change percent'].replace('%', '');
                    
                    return {
                        price: price.toFixed(2),
                        change: (change >= 0 ? '+' : '') + change.toFixed(2),
                        changePercent: (change >= 0 ? '+' : '') + parseFloat(changePercent).toFixed(2) + '%',
                        trend: change >= 0 ? 'up' : 'down',
                        open: parseFloat(quote['02. open']).toFixed(2),
                        high: parseFloat(quote['03. high']).toFixed(2),
                        low: parseFloat(quote['04. low']).toFixed(2),
                        volume: parseInt(quote['06. volume']).toLocaleString(),
                        latestTradingDay: quote['07. latest trading day']
                    };
                } else if (data['Note']) {
                    console.warn('API频率限制:', data['Note']);
                    showError('API请求频率限制，请稍后刷新');
                    return null;
                } else {
                    console.error('API返回异常:', data);
                    showError('获取数据失败');
                    return null;
                }
            } catch (error) {
                console.error('获取股价失败:', error);
                showError('网络错误，请检查连接');
                return null;
            }
        }
        
        // 显示错误信息
        function showError(message) {
            document.getElementById('currentPrice').textContent = '--';
            document.getElementById('changeValue').textContent = message;
            document.getElementById('changePercent').textContent = '';
        }
        
        // 加载股票信息
        async function loadStock() {
            const stockCode = getUrlParam('code');
            
            if (!stockCode || !stockDatabase[stockCode]) {
                document.getElementById('stockName').textContent = '股票不存在';
                return;
            }
            
            currentStock = stockDatabase[stockCode];
            
            // 填充静态信息
            document.getElementById('stockName').textContent = currentStock.name;
            document.getElementById('stockCode').textContent = currentStock.code;
            document.getElementById('companyDesc').textContent = currentStock.desc;
            document.getElementById('foundDate').textContent = currentStock.foundDate;
            document.getElementById('hqLocation').textContent = currentStock.hqLocation;
            document.getElementById('ceoName').textContent = currentStock.ceo;
            document.getElementById('employeeCount').textContent = currentStock.employees;
            
            // 获取实时股价
            const priceData = await fetchStockPrice(stockCode);
            
            if (priceData) {
                currentStockPrice = priceData;
                
                // 填充价格信息
                document.getElementById('currentPrice').textContent = '$' + priceData.price;
                document.getElementById('changeValue').textContent = priceData.change;
                document.getElementById('changePercent').textContent = priceData.changePercent;
                
                // 设置颜色
                const trend = priceData.trend;
                document.getElementById('currentPrice').className = 'stock-current-price ' + trend;
                document.getElementById('changeValue').className = 'stock-change-value ' + trend;
                document.getElementById('changePercent').className = 'stock-change-percent ' + trend;
                
                // 市场数据
                document.getElementById('openPrice').textContent = '$' + priceData.open;
                document.getElementById('highPrice').textContent = '$' + priceData.high;
                document.getElementById('lowPrice').textContent = '$' + priceData.low;
                document.getElementById('marketCap').textContent = currentStock.marketCap;
                
                // 绘制走势图
                drawChart(trend);
            } else {
                // 使用默认数据
                document.getElementById('currentPrice').textContent = '--';
                document.getElementById('changeValue').textContent = '数据加载失败';
                document.getElementById('changePercent').textContent = '';
            }
            
            // 加载相关新闻
            loadRelatedNews(stockCode);
        }
        
        // 绘制走势图
        function drawChart(trend) {
            const canvas = document.getElementById('stockChart');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            
            // 生成模拟数据
            const dataPoints = 50;
            const data = [];
            let price = 100;
            
            for (let i = 0; i < dataPoints; i++) {
                const change = (Math.random() - 0.5) * 4;
                price += change;
                data.push(price);
            }
            
            // 清除画布
            ctx.clearRect(0, 0, width, height);
            
            // 找出最大最小值
            const minPrice = Math.min(...data);
            const maxPrice = Math.max(...data);
            const range = maxPrice - minPrice;
            
            // 绘制渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            const colorStart = trend === 'up' ? 'rgba(239, 68, 68, 0.2)' : 'rgba(34, 197, 94, 0.2)';
            const colorEnd = trend === 'up' ? 'rgba(239, 68, 68, 0)' : 'rgba(34, 197, 94, 0)';
            gradient.addColorStop(0, colorStart);
            gradient.addColorStop(1, colorEnd);
            
            // 绘制填充区域
            ctx.beginPath();
            ctx.moveTo(0, height);
            data.forEach((price, i) => {
                const x = (i / (dataPoints - 1)) * width;
                const y = height - ((price - minPrice) / range) * (height - 40) - 20;
                ctx.lineTo(x, y);
            });
            ctx.lineTo(width, height);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 绘制线条
            ctx.beginPath();
            ctx.strokeStyle = trend === 'up' ? '#ef4444' : '#22c55e';
            ctx.lineWidth = 2;
            data.forEach((price, i) => {
                const x = (i / (dataPoints - 1)) * width;
                const y = height - ((price - minPrice) / range) * (height - 40) - 20;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
            
            // 绘制数据点
            data.forEach((price, i) => {
                if (i % 10 === 0) {
                    const x = (i / (dataPoints - 1)) * width;
                    const y = height - ((price - minPrice) / range) * (height - 40) - 20;
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = trend === 'up' ? '#ef4444' : '#22c55e';
                    ctx.fill();
                }
            });
        }
        
        // 加载相关新闻
        function loadRelatedNews(stockCode) {
            const related = newsData.filter(n => n.stocks.includes(stockCode));
            const container = document.getElementById('relatedNews');
            
            if (related.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无相关新闻</div>';
                return;
            }
            
            related.forEach(news => {
                const div = document.createElement('div');
                div.className = 'news-item';
                div.onclick = () => window.location.href = `detail.html?id=${news.id}`;
                div.innerHTML = `
                    <img class="news-thumb" src="${news.image}" alt="">
                    <div class="news-content">
                        <div class="news-title">${news.title}</div>
                        <div class="news-meta">${news.source} · ${news.time}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        // 加入自选
        function addToWatchlist() {
            if (currentStock) {
                alert(`已将 ${currentStock.name}(${currentStock.code}) 加入自选`);
            }
        }
        
        // 分享
        function shareStock() {
            if (navigator.share && currentStock) {
                navigator.share({
                    title: `${currentStock.name}(${currentStock.code}) - $${currentStock.price}`,
                    text: `${currentStock.name}当前股价$${currentStock.price}，${currentStock.changePercent}`,
                    url: window.location.href
                });
            } else {
                alert('链接已复制');
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStock();
        });
    </script>
</body>
</html>
