<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前沿科技日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .header { background: #f04142; color: white; padding: 12px 16px; }
        .logo { font-size: 20px; font-weight: 700; }
        .content { padding: 12px; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .title { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .summary { font-size: 14px; color: #666; line-height: 1.6; }
        .footer { font-size: 12px; color: #999; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📱 前沿科技日报</div>
    </div>
    
    <div class="content" id="list">
        <div class="card">
            <div class="title">加载中...</div>
        </div>
    </div>

    <script>
        const news = [
            { title: "本田因电动车项目取消首次出现财务亏损", summary: "这家标志性汽车巨头称其未来不确定，因巨额财务亏损归咎于中国和美国特朗普政府。", source: "澳大利亚新闻" },
            { title: "华虹集团传掌握7纳米工艺打造AI芯片", summary: "中国强调加快高水平科技自立自强，华虹集团已开发出可用于生产AI芯片的7纳米工艺。", source: "香港财经" },
            { title: "特斯拉4680电池正式量产 成本降低50%", summary: "特斯拉宣布4680电池正式量产，能量密度提升5倍，成本降低50%。", source: "EV新闻" },
            { title: "OpenAI发布GPT-4 Turbo", summary: "OpenAI在开发者大会上发布GPT-4 Turbo模型，支持更长上下文，API价格降低50%。", source: "机器之心" },
            { title: "SpaceX星舰第四次试飞成功", summary: "SpaceX星舰完成第四次轨道试飞，助推器成功在墨西哥湾软着陆。", source: "澎湃新闻" }
        ];
        
        let html = '';
        for (let i = 0; i < news.length; i++) {
            html += '<div class="card">';
            html += '<div class="title">' + news[i].title + '</div>';
            html += '<div class="summary">' + news[i].summary + '</div>';
            html += '<div class="footer">' + news[i].source + ' · 刚刚</div>';
            html += '</div>';
        }
        document.getElementById('list').innerHTML = html;
    </script>
</body>
</html>
