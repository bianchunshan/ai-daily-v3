        function renderNews(list) {
            console.log('开始渲染，新闻数:', list.length);
            const container = document.getElementById('newsList');
            const loading = document.getElementById('loading');
            
            try {
                container.innerHTML = '';
                
                if (list.length === 0) {
                    container.innerHTML = '<p>暂无新闻</p>';
                    loading.style.display = 'none';
                    return;
                }
                
                list.forEach((news, index) => {
                    console.log('渲染第', index + 1, '条:', news.title);
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${news.title}</h3>
                        <img src="${news.image}" alt="" onerror="this.style.display='none'">
                        <p>${news.summary}</p>
                        <small>${news.source} · ${news.time}</small>
                    `;
                    container.appendChild(card);
                });
                
                loading.style.display = 'none';
                console.log('渲染完成');
            } catch (e) {
                console.error('渲染错误:', e);
                loading.innerHTML = '加载出错: ' + e.message;
            }
        }
        
        // 页面加载完成后渲染
        window.onload = function() {
            console.log('页面加载完成');
            renderNews(newsData);
        };
    </script>
</body>
