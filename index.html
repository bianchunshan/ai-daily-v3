        function renderNews(list) {
            var container = document.getElementById('newsList');
            var html = '';
            for (var i = 0; i < list.length; i++) {
                var n = list[i];
                html += '<div class="card" onclick="window.open(\'' + n.url + '\', \'_blank\')" style="cursor:pointer;">';                html += '<div class="card-title">' + n.title + '</div>';                html += '<div class="card-summary">' + n.summary + '</div>';
                html += '<div class="card-footer">';
                html += '<span class="tag tag-red">' + n.category + '</span>';
                for (var j = 0; j < n.tags.length; j++) {
                    html += '<span class="tag">' + n.tags[j] + '</span>';
                }
                html += '<br>' + n.source;
                for (var k = 0; k < n.stocks.length; k++) {
                    var s = n.stocks[k];
                    var cls = s.trend === 'up' ? 'stock-up' : 'stock-down';
                    html += '<span class="' + cls + '" style="font-size:11px;">' + s.name + ' ' + s.change + '</span>';
                }
                html += ' · ' + n.time;
                html += '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }

        function showAll() {
            setActive(0);
            renderNews(newsData);
        }

        function showCat(cat) {
            var navItems = document.querySelectorAll('.nav-item');
            for (var i = 0; i < navItems.length; i++) {
                if (navItems[i].innerText === cat) {
                    setActive(i);
                    break;
                }
            }
            var filtered = [];
            for (var j = 0; j < newsData.length; j++) {
                if (newsData[j].category === cat) {
                    filtered.push(newsData[j]);
                }
            }
            renderNews(filtered);
        }

        function setActive(index) {
            var items = document.querySelectorAll('.nav-item');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
            }
            items[index].classList.add('active');
        }

        // 初始渲染
        renderNews(newsData);
    </script>
</body>
</html>
